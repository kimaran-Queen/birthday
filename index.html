<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>방명록 초기화</title>
<style>
  body{ font-family: sans-serif; max-width:480px; margin:60px auto; text-align:center; }
  button{ font-size:16px; padding:14px 28px; cursor:pointer; background:#c13b3b; color:#fff; border:none; border-radius:6px; }
  button:hover{ background:#a52f2f; }
  #status{ margin-top:20px; font-size:14px; color:#555; }
</style>
</head>
<body>
  <h2>방명록 테스트 메세지 초기화</h2>
  <p>버튼을 누르면 지금까지 쌓인 방명록 메세지가 전부 삭제되고 빈 목록으로 초기화돼요.</p>
  <button id="btnReset">방명록 비우기</button>
  <div id="status"></div>

<script>
const BIN_ID = "6a575547da38895dfe602f89";
const MASTER_KEY = "$2a$10$Irf5pM5mXI5X6cwqcXKyU.rN9ShP2eL89cxqNYKIydTMoEWWS2Nde";

document.getElementById('btnReset').addEventListener('click', async ()=>{
  const status = document.getElementById('status');
  status.textContent = '초기화 중...';
  try{
    const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
      method:'PUT',
      headers:{
        'Content-Type':'application/json',
        'X-Master-Key': MASTER_KEY
      },
      body: JSON.stringify({ messages: [] })
    });
    if(!res.ok) throw new Error('실패: ' + res.status);
    status.textContent = '✅ 방명록이 비워졌어요!';
  }catch(e){
    status.textContent = '❌ 실패했어요: ' + e.message;
  }
});
</script>
</body>
</html>
