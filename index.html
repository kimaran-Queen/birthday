<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>생일 확인 서류</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#EDE4D0;
  --paper-dark:#E1D5B8;
  --ink:#2A2521;
  --stamp-red:#C13B3B;
  --tape-yellow:#F2C744;
  --line-grey:#B5A88F;
  --blush:#E8A0AC;
  --white-card:#FBF7EE;
}
*{box-sizing:border-box; margin:0; padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'Noto Sans KR', sans-serif;
  background:var(--paper);
  color:var(--ink);
  overflow-x:hidden;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(0,0,0,0.02) 0, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0,0,0,0.02) 0, transparent 40%);
}
.hidden{display:none !important;}

#gate{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}
.doc-card{
  background:var(--white-card);
  border:2px solid var(--ink);
  max-width:440px;
  width:100%;
  padding:40px 32px;
  position:relative;
  box-shadow:8px 8px 0 var(--ink);
}
.doc-card::before{
  content:"";
  position:absolute;
  inset:10px;
  border:1.5px dashed var(--line-grey);
  pointer-events:none;
}
.doc-eyebrow{
  font-size:13px;
  letter-spacing:4px;
  color:var(--stamp-red);
  font-weight:700;
  text-align:center;
  margin-bottom:6px;
}
.doc-title{
  font-family:'Black Han Sans', sans-serif;
  font-size:15px;
  text-align:center;
  color:var(--ink);
  opacity:0.6;
  margin-bottom:28px;
  letter-spacing:2px;
}
.doc-question{
  font-family:'Black Han Sans', sans-serif;
  font-size:30px;
  text-align:center;
  line-height:1.5;
  margin-bottom:8px;
}
.doc-sub{
  text-align:center;
  font-size:13px;
  color:#7a7266;
  margin-bottom:32px;
}
.doc-buttons{
  display:flex;
  gap:16px;
  justify-content:center;
}
.doc-btn{
  font-family:'Noto Sans KR', sans-serif;
  font-weight:700;
  font-size:17px;
  padding:14px 32px;
  border:2px solid var(--ink);
  background:var(--paper);
  cursor:pointer;
  position:relative;
  transition:transform 0.08s ease;
}
.doc-btn:active{ transform: translate(2px,2px); }
.doc-btn.yes{ background:var(--ink); color:var(--white-card); }
.doc-btn.yes:hover{ background:var(--stamp-red); border-color:var(--stamp-red); }
.doc-btn.no:hover{ background:#e8ddc4; }
.doc-check{
  font-size:11px;
  text-align:center;
  margin-top:24px;
  color:#9c9384;
}
.gb-field{ display:flex; flex-direction:column; gap:5px; margin-top:14px; }
.gb-field label{ font-size:12px; font-weight:700; color:#6b6255; }
.gb-field input[type=text], .gb-field textarea{
  width:100%;
  font-family:'Noto Sans KR', sans-serif;
  font-size:14px;
  padding:9px 10px;
  border:1.5px solid var(--line-grey);
  background:var(--paper);
  color:var(--ink);
  resize:vertical;
}
.gb-item{
  border:1.5px solid var(--line-grey);
  background:var(--paper);
  padding:10px 12px;
}
.gb-item-name{ font-weight:700; font-size:13px; margin-bottom:4px; color:var(--stamp-red); }
.gb-item-msg{ font-size:13px; color:#4a453d; white-space:pre-line; line-height:1.5; }

#stamp-splash{
  position:fixed; inset:0;
  background:rgba(20,16,14,0.92);
  display:flex; align-items:center; justify-content:center;
  z-index:100;
}
.stamp-mark{
  font-family:'Black Han Sans', sans-serif;
  font-size:min(18vw, 140px);
  color:var(--stamp-red);
  border:10px solid var(--stamp-red);
  border-radius:50%;
  width:min(60vw, 320px);
  height:min(60vw, 320px);
  display:flex; align-items:center; justify-content:center;
  text-align:center;
  transform:rotate(-18deg) scale(2.4);
  opacity:0;
  line-height:1.15;
  padding:10px;
  white-space:pre-line;
}
.stamp-mark.slam{ animation: slam 0.55s cubic-bezier(.2,1.4,.4,1) forwards; }
@keyframes slam{
  0%{ transform:rotate(-18deg) scale(2.4); opacity:0; }
  60%{ transform:rotate(-14deg) scale(0.94); opacity:1; }
  80%{ transform:rotate(-16deg) scale(1.05); }
  100%{ transform:rotate(-15deg) scale(1); opacity:1; }
}

#reject{
  position:fixed; inset:0;
  z-index:200;
  background: repeating-linear-gradient(45deg, #C13B3B 0 24px, #1a1310 24px 48px);
  display:flex; align-items:center; justify-content:center;
  text-align:center;
  padding:24px;
}
.reject-card{
  background:#1a1310;
  color:#fff;
  border:4px solid #F2C744;
  padding:40px 32px;
  max-width:460px;
  width:100%;
  position:relative;
  z-index:205;
}
.reject-title{
  font-family:'Black Han Sans', sans-serif;
  font-size:44px;
  color:#F2C744;
  margin-bottom:12px;
  line-height:1.2;
}
.reject-sub{ font-size:15px; margin-bottom:24px; opacity:0.85; }
.reject-img{ max-width:100%; border:3px solid #F2C744; margin-bottom:24px; }
.reject-emoji{
  font-size:80px;
  margin-bottom:24px;
  display:block;
  animation: sirenPulse 0.6s ease-in-out infinite, sirenFlash 0.3s steps(1) infinite;
}
@keyframes sirenPulse{
  0%,100%{ transform:scale(1) rotate(-4deg); }
  50%{ transform:scale(1.18) rotate(4deg); }
}
@keyframes sirenFlash{
  0%, 49%{ filter: drop-shadow(0 0 10px #ff3b3b) drop-shadow(0 0 22px #ff3b3b) brightness(1.15); }
  50%, 100%{ filter: drop-shadow(0 0 10px #ffd93b) drop-shadow(0 0 22px #ffd93b) brightness(1.3); }
}
.reject-btn{
  font-family:'Noto Sans KR', sans-serif;
  font-weight:700;
  padding:12px 28px;
  background:#F2C744;
  border:none;
  cursor:pointer;
  font-size:15px;
  margin-top:20px;
  position:relative;
  z-index:220;
}
.reject-btn:active{ transform:translate(2px,2px); }

#chaosLayer{
  position:absolute; inset:0;
  overflow:hidden;
  z-index:210;
  pointer-events:none;
}
@keyframes chaosPop{
  0%{ opacity:0; transform:scale(0.4) rotate(var(--rot,0deg)); }
  15%{ opacity:1; transform:scale(1.2) rotate(var(--rot,0deg)); }
  30%{ transform:scale(1) rotate(var(--rot,0deg)); }
  75%{ opacity:1; transform:scale(1) rotate(var(--rot,0deg)); }
  100%{ opacity:0; transform:scale(0.85) rotate(var(--rot,0deg)); }
}
.chaos-text{
  position:absolute;
  font-family:'Black Han Sans', sans-serif;
  white-space:nowrap;
  text-shadow:2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
  animation: chaosPop 0.65s ease-out forwards;
  pointer-events:none;
}
.chaos-img{
  position:absolute;
  filter: drop-shadow(2px 3px 5px rgba(0,0,0,0.55));
  animation: chaosPop 0.65s ease-out forwards;
  pointer-events:none;
}

#content{ padding-bottom:80px; }
.section{ max-width:680px; margin:0 auto; padding:90px 24px; }
.reveal{ opacity:0; transform:translateY(24px); transition:opacity 0.7s ease, transform 0.7s ease; }
.reveal.show{ opacity:1; transform:translateY(0); }

.hero{
  min-height:92vh;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:40px 24px;
}
.hero-eyebrow{ font-size:13px; letter-spacing:3px; color:var(--stamp-red); font-weight:700; margin-bottom:16px; }
.hero-title{ font-family:'Black Han Sans', sans-serif; font-size:clamp(38px, 9vw, 76px); line-height:1.15; margin-bottom:20px; }
.hero-underline{ display:inline-block; position:relative; }
.hero-underline::after{
  content:""; position:absolute; left:0; right:0; bottom:2px; height:14px;
  background:var(--tape-yellow); z-index:-1; opacity:0.85;
}
.hero-desc{ font-size:16px; color:#5c554a; max-width:420px; }
.hero-scroll{ margin-top:56px; font-size:13px; color:#9c9384; animation:bob 1.6s ease-in-out infinite; }
@keyframes bob{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(8px);} }

.label{ font-family:'Black Han Sans', sans-serif; font-size:14px; letter-spacing:2px; color:var(--stamp-red); margin-bottom:10px; }
.section-title{ font-family:'Black Han Sans', sans-serif; font-size:clamp(26px,5vw,36px); margin-bottom:32px; }

.letter-card{
  background:var(--white-card); border:2px solid var(--ink); padding:48px 36px;
  position:relative; box-shadow:6px 6px 0 var(--paper-dark);
}
.tape{ position:absolute; width:70px; height:26px; background:rgba(242,199,68,0.75); border:1px solid rgba(0,0,0,0.15); }
.tape.tl{ top:-14px; left:20px; transform:rotate(-6deg); }
.tape.tr{ top:-14px; right:20px; transform:rotate(5deg); }
.letter-body{ font-family:'Gaegu', sans-serif; font-size:20px; line-height:2; white-space:pre-line; }
.letter-sign{ font-family:'Gaegu', sans-serif; font-size:20px; text-align:right; margin-top:24px; font-weight:700; }

.timeline{ border-left:2px dashed var(--line-grey); padding-left:28px; display:flex; flex-direction:column; gap:36px; }
.tl-item{ position:relative; }
.tl-item::before{
  content:""; position:absolute; left:-34px; top:4px; width:12px; height:12px; border-radius:50%;
  background:var(--stamp-red); border:3px solid var(--paper); box-shadow:0 0 0 2px var(--stamp-red);
}
.tl-date{ font-size:12px; font-weight:700; color:var(--stamp-red); letter-spacing:1px; margin-bottom:4px; }
.tl-title{ font-family:'Black Han Sans', sans-serif; font-size:19px; margin-bottom:6px; }
.tl-desc{ font-size:14px; color:#5c554a; line-height:1.7; }

.gallery{ display:grid; grid-template-columns:repeat(2, 1fr); gap:20px; }
.polaroid{
  background:var(--white-card); border:1px solid var(--ink); padding:10px 10px 24px;
  box-shadow:4px 4px 0 var(--paper-dark); transform:rotate(var(--r,0deg));
}
.polaroid:nth-child(odd){ --r:-2deg; }
.polaroid:nth-child(even){ --r:2deg; }
.polaroid-img{ width:100%; aspect-ratio:1/1; object-fit:cover; display:block; background:var(--paper-dark); }
.polaroid-placeholder{
  width:100%; aspect-ratio:1/1; border:2px dashed var(--line-grey);
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:6px;
  color:#a89d87; font-size:12px; text-align:center;
}
.polaroid-caption{ font-family:'Gaegu', sans-serif; font-size:14px; text-align:center; margin-top:8px; }

.closing{ text-align:center; }
.closing-title{ font-family:'Black Han Sans', sans-serif; font-size:clamp(28px,6vw,44px); margin-bottom:16px; }
.closing-desc{ font-size:15px; color:#5c554a; margin-bottom:32px; }
.replay-btn{
  font-family:'Noto Sans KR', sans-serif; font-weight:700; padding:12px 28px;
  border:2px solid var(--ink); background:transparent; cursor:pointer; font-size:14px;
}
.replay-btn:hover{ background:var(--ink); color:var(--white-card); }

@media(max-width:520px){
  .gallery{ grid-template-columns:1fr 1fr; gap:14px; }
  .letter-card{ padding:32px 22px; }
}
</style>
</head>

  const now = Date.now();
  const diff = target - now;
  if(diff <= 0){
    el.textContent = "생일 축하해! 🎉";
    return;
  }
  const d = Math.floor(diff / (1000*60*60*24));
  const h = Math.floor((diff / (1000*60*60)) % 24);
  const m = Math.floor((diff / (1000*60)) % 60);
  const s = Math.floor((diff / 1000) % 60);
  el.textContent = `생일까지 ${d}일 ${h}시간 ${m}분 ${s}초`;
}

let chaosTimer = null;
function startChaos(){
  stopChaos();
  chaosTimer = setInterval(()=>{
    if(Math.random() < 0.6){ spawnChaosText(); } else { spawnChaosImg(); }
  }, 220);
}
function stopChaos(){
  if(chaosTimer){ clearInterval(chaosTimer); chaosTimer = null; }
  const layer = document.getElementById('chaosLayer');
  if(layer) layer.innerHTML = '';
}
function spawnChaosText(){
  const layer = document.getElementById('chaosLayer');
  if(!layer) return;
  const el = document.createElement('div');
  el.className = 'chaos-text';
  el.textContent = CONFIG.rejectTitle || '당장 나가시오';
  const colors = ['#F2C744','#ffffff','#ff5252','#7CFC00','#4FC3F7'];
  el.style.color = colors[Math.floor(Math.random()*colors.length)];
  el.style.left = (Math.random()*75) + '%';
  el.style.top = (Math.random()*68) + '%';
  el.style.fontSize = (16 + Math.random()*28) + 'px';
  el.style.setProperty('--rot', (Math.random()*60-30) + 'deg');
  layer.appendChild(el);
  setTimeout(()=>{ el.remove(); }, 650);
}
function spawnChaosImg(){
  const layer = document.getElementById('chaosLayer');
  if(!layer || !CONFIG.chaosImages || !CONFIG.chaosImages.length) return;
  const el = document.createElement('img');
  el.className = 'chaos-img';
  el.src = CONFIG.chaosImages[Math.floor(Math.random()*CONFIG.chaosImages.length)];
  const size = 46 + Math.random()*64;
  el.style.width = size + 'px';
  el.style.left = (Math.random()*82) + '%';
  el.style.top = (Math.random()*66) + '%';
  el.style.setProperty('--rot', (Math.random()*50-25) + 'deg');
  layer.appendChild(el);
  setTimeout(()=>{ el.remove(); }, 650);
}

function initReveal(){
  const items = document.querySelectorAll('.reveal');
  const io = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
      if(e.isIntersecting){ e.target.classList.add('show'); }
    });
  }, { threshold:0.15 });
  items.forEach(i=>io.observe(i));
}

// ---------- 방명록(축하 메세지, GitHub Issues 기반) ----------
function ghApiBase(){
  return `https://api.github.com/repos/${CONFIG.githubOwner}/${CONFIG.githubRepo}/issues`;
}

async function fetchGuestbookItems(){
  try{
    const res = await fetch(`${ghApiBase()}?labels=${encodeURIComponent(CONFIG.guestbookLabel)}&state=all&per_page=100&sort=created&direction=desc`, {
      headers:{ 'Accept':'application/vnd.github+json' }
    });
    if(!res.ok) return [];
    const data = await res.json();
    if(!Array.isArray(data)) return [];
    return data.map(issue => ({
      name: issue.title || '익명',
      message: issue.body || '',
      time: issue.created_at
    }));
  }catch(e){
    return [];
  }
}

function renderGuestbookList(items){
  const listEl = document.getElementById('gbList');
  if(!listEl) return;
  if(!items || !items.length){
    listEl.innerHTML = '<div style="font-size:13px; color:#9c9384;">아직 메세지가 없어요. 첫 번째로 남겨보세요!</div>';
    return;
  }
  listEl.innerHTML = '';
  items.forEach(item=>{
    const card = document.createElement('div');
    card.className = 'gb-item';
    const name = document.createElement('div');
    name.className = 'gb-item-name';
    name.textContent = item.name || '익명';
    const msg = document.createElement('div');
    msg.className = 'gb-item-msg';
    msg.textContent = item.message || '';
    card.appendChild(name);
    card.appendChild(msg);
    listEl.appendChild(card);
  });
}

async function loadGuestbook(){
  const listEl = document.getElementById('gbList');
  if(listEl) listEl.innerHTML = '<div style="font-size:13px; color:#9c9384;">불러오는 중...</div>';
  const items = await fetchGuestbookItems();
  renderGuestbookList(items);
}

document.getElementById('btnGbSend').addEventListener('click', async ()=>{
  const nameEl = document.getElementById('gbName');
  const msgEl = document.getElementById('gbMessage');
  const status = document.getElementById('gbStatus');
  const name = nameEl.value.trim() || '익명';
  const message = msgEl.value.trim();
  if(!message){ if(status) status.textContent = '메세지를 입력해줘!'; return; }
  if(!CONFIG.githubToken){
    if(status) status.textContent = '아직 전송 기능이 설정 안 됐어요 (관리자에게 문의).';
    return;
  }
  if(status) status.textContent = '보내는 중...';
  try{
    const res = await fetch(ghApiBase(), {
      method:'POST',
      headers:{
        'Accept':'application/vnd.github+json',
        'Authorization': 'Bearer ' + CONFIG.githubToken,
        'Content-Type':'application/json'
      },
      body: JSON.stringify({
        title: name,
        body: message,
        labels: [CONFIG.guestbookLabel]
      })
    });
    if(!res.ok) throw new Error('save failed: ' + res.status);
    msgEl.value = '';
    if(status) status.textContent = '축하 메세지 등록 완료! 🎉';
    loadGuestbook();
  }catch(e){
    if(status) status.textContent = '전송 실패했어요 ㅠ 네트워크를 확인하고 다시 시도해줘. (' + e.message + ')';
  }
});
