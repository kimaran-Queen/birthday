<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>생일 확인 서류</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
/* ============================================================
   🎂 여기서부터 자유롭게 수정하세요! (설정 구간)
   ============================================================ */
:root{
  --paper:#EDE4D0;
  --paper-dark:#E1D5B8;
  --ink:#2A2521;
  --stamp-red:#C13B3B;
  --tape-yellow:#F2C744;
  --line-grey:#B5A88F;
  --blush:#E8A0AC;
  --white-card:#FBF7EE;
}
*{box-sizing:border-box; margin:0; padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'Noto Sans KR', sans-serif;
  background:var(--paper);
  color:var(--ink);
  overflow-x:hidden;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(0,0,0,0.02) 0, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0,0,0,0.02) 0, transparent 40%);
}
.hidden{display:none !important;}

/* ---------- 게이트 화면 ---------- */
#gate{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}
.doc-card{
  background:var(--white-card);
  border:2px solid var(--ink);
  max-width:440px;
  width:100%;
  padding:40px 32px;
  position:relative;
  box-shadow:8px 8px 0 var(--ink);
}
.doc-card::before{
  content:"";
  position:absolute;
  inset:10px;
  border:1.5px dashed var(--line-grey);
  pointer-events:none;
}
.doc-eyebrow{
  font-size:13px;
  letter-spacing:4px;
  color:var(--stamp-red);
  font-weight:700;
  text-align:center;
  margin-bottom:6px;
}
.doc-title{
  font-family:'Black Han Sans', sans-serif;
  font-size:15px;
  text-align:center;
  color:var(--ink);
  opacity:0.6;
  margin-bottom:28px;
  letter-spacing:2px;
}
.doc-question{
  font-family:'Black Han Sans', sans-serif;
  font-size:32px;
  text-align:center;
  line-height:1.5;
  margin-bottom:8px;
}
.doc-sub{
  text-align:center;
  font-size:13px;
  color:#7a7266;
  margin-bottom:32px;
}
.doc-buttons{
  display:flex;
  gap:16px;
  justify-content:center;
}
.doc-btn{
  font-family:'Noto Sans KR', sans-serif;
  font-weight:700;
  font-size:17px;
  padding:14px 32px;
  border:2px solid var(--ink);
  background:var(--paper);
  cursor:pointer;
  position:relative;
  transition:transform 0.08s ease;
}
.doc-btn:active{ transform: translate(2px,2px); }
.doc-btn.yes{ background:var(--ink); color:var(--white-card); }
.doc-btn.yes:hover{ background:var(--stamp-red); border-color:var(--stamp-red); }
.doc-btn.no:hover{ background:#e8ddc4; }
.doc-check{
  font-size:11px;
  text-align:center;
  margin-top:24px;
  color:#9c9384;
}

/* ---------- 도장 스플래시 ---------- */
#stamp-splash{
  position:fixed; inset:0;
  background:rgba(20,16,14,0.92);
  display:flex; align-items:center; justify-content:center;
  z-index:100;
}
.stamp-mark{
  font-family:'Black Han Sans', sans-serif;
  font-size:min(18vw, 140px);
  color:var(--stamp-red);
  border:10px solid var(--stamp-red);
  border-radius:50%;
  width:min(60vw, 320px);
  height:min(60vw, 320px);
  display:flex; align-items:center; justify-content:center;
  text-align:center;
  transform:rotate(-18deg) scale(2.4);
  opacity:0;
  line-height:1.15;
  padding:10px;
}
.stamp-mark.slam{
  animation: slam 0.55s cubic-bezier(.2,1.4,.4,1) forwards;
}
@keyframes slam{
  0%{ transform:rotate(-18deg) scale(2.4); opacity:0; }
  60%{ transform:rotate(-14deg) scale(0.94); opacity:1; }
  80%{ transform:rotate(-16deg) scale(1.05); }
  100%{ transform:rotate(-15deg) scale(1); opacity:1; }
}

/* ---------- 경고 화면 ---------- */
#reject{
  position:fixed; inset:0;
  z-index:200;
  background:
    repeating-linear-gradient(45deg, #C13B3B 0 24px, #1a1310 24px 48px);
  display:flex; align-items:center; justify-content:center;
  text-align:center;
  padding:24px;
}
.reject-card{
  background:#1a1310;
  color:#fff;
  border:4px solid #F2C744;
  padding:40px 32px;
  max-width:460px;
  width:100%;
}
.reject-title{
  font-family:'Black Han Sans', sans-serif;
  font-size:44px;
  color:#F2C744;
  margin-bottom:12px;
  line-height:1.2;
}
.reject-sub{
  font-size:15px;
  margin-bottom:24px;
  opacity:0.85;
}
.reject-img{
  max-width:100%;
  border:3px solid #F2C744;
  margin-bottom:24px;
}
.reject-emoji{
  font-size:80px;
  margin-bottom:24px;
}
.reject-btn{
  font-family:'Noto Sans KR', sans-serif;
  font-weight:700;
  padding:12px 28px;
  background:#F2C744;
  border:none;
  cursor:pointer;
  font-size:15px;
}

/* ---------- 본문 ---------- */
#content{ padding-bottom:80px; }
.section{
  max-width:680px;
  margin:0 auto;
  padding:90px 24px;
}
.reveal{
  opacity:0;
  transform:translateY(24px);
  transition:opacity 0.7s ease, transform 0.7s ease;
}
.reveal.show{ opacity:1; transform:translateY(0); }

/* 히어로 */
.hero{
  min-height:92vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px 24px;
}
.hero-eyebrow{
  font-size:13px;
  letter-spacing:3px;
  color:var(--stamp-red);
  font-weight:700;
  margin-bottom:16px;
}
.hero-title{
  font-family:'Black Han Sans', sans-serif;
  font-size:clamp(38px, 9vw, 76px);
  line-height:1.15;
  margin-bottom:20px;
}
.hero-underline{
  display:inline-block;
  position:relative;
}
.hero-underline::after{
  content:"";
  position:absolute;
  left:0; right:0; bottom:2px;
  height:14px;
  background:var(--tape-yellow);
  z-index:-1;
  opacity:0.85;
}
.hero-desc{
  font-size:16px;
  color:#5c554a;
  max-width:420px;
}
.hero-scroll{
  margin-top:56px;
  font-size:13px;
  color:#9c9384;
  animation:bob 1.6s ease-in-out infinite;
}
@keyframes bob{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(8px);} }

/* 섹션 라벨 */
.label{
  font-family:'Black Han Sans', sans-serif;
  font-size:14px;
  letter-spacing:2px;
  color:var(--stamp-red);
  margin-bottom:10px;
}
.section-title{
  font-family:'Black Han Sans', sans-serif;
  font-size:clamp(26px,5vw,36px);
  margin-bottom:32px;
}

/* 편지 카드 */
.letter-card{
  background:var(--white-card);
  border:2px solid var(--ink);
  padding:48px 36px;
  position:relative;
  box-shadow:6px 6px 0 var(--paper-dark);
}
.tape{
  position:absolute;
  width:70px; height:26px;
  background:rgba(242,199,68,0.75);
  border:1px solid rgba(0,0,0,0.15);
}
.tape.tl{ top:-14px; left:20px; transform:rotate(-6deg); }
.tape.tr{ top:-14px; right:20px; transform:rotate(5deg); }
.letter-body{
  font-family:'Gaegu', sans-serif;
  font-size:20px;
  line-height:2;
  white-space:pre-line;
}
.letter-sign{
  font-family:'Gaegu', sans-serif;
  font-size:20px;
  text-align:right;
  margin-top:24px;
  font-weight:700;
}

/* 타임라인 */
.timeline{
  border-left:2px dashed var(--line-grey);
  padding-left:28px;
  display:flex;
  flex-direction:column;
  gap:36px;
}
.tl-item{ position:relative; }
.tl-item::before{
  content:"";
  position:absolute;
  left:-34px; top:4px;
  width:12px; height:12px;
  border-radius:50%;
  background:var(--stamp-red);
  border:3px solid var(--paper);
  box-shadow:0 0 0 2px var(--stamp-red);
}
.tl-date{
  font-size:12px;
  font-weight:700;
  color:var(--stamp-red);
  letter-spacing:1px;
  margin-bottom:4px;
}
.tl-title{
  font-family:'Black Han Sans', sans-serif;
  font-size:19px;
  margin-bottom:6px;
}
.tl-desc{ font-size:14px; color:#5c554a; line-height:1.7; }

/* 사진 갤러리 */
.gallery{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:20px;
}
.polaroid{
  background:var(--white-card);
  border:1px solid var(--ink);
  padding:10px 10px 24px;
  box-shadow:4px 4px 0 var(--paper-dark);
  transform:rotate(var(--r,0deg));
}
.polaroid:nth-child(odd){ --r:-2deg; }
.polaroid:nth-child(even){ --r:2deg; }
.polaroid-img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  display:block;
  background:var(--paper-dark);
}
.polaroid-placeholder{
  width:100%;
  aspect-ratio:1/1;
  border:2px dashed var(--line-grey);
  display:flex; align-items:center; justify-content:center;
  flex-direction:column;
  gap:6px;
  color:#a89d87;
  font-size:12px;
  text-align:center;
}
.polaroid-caption{
  font-family:'Gaegu', sans-serif;
  font-size:14px;
  text-align:center;
  margin-top:8px;
}

/* 클로징 */
.closing{
  text-align:center;
}
.closing-title{
  font-family:'Black Han Sans', sans-serif;
  font-size:clamp(28px,6vw,44px);
  margin-bottom:16px;
}
.closing-desc{
  font-size:15px;
  color:#5c554a;
  margin-bottom:32px;
}
.replay-btn{
  font-family:'Noto Sans KR', sans-serif;
  font-weight:700;
  padding:12px 28px;
  border:2px solid var(--ink);
  background:transparent;
  cursor:pointer;
  font-size:14px;
}
.replay-btn:hover{ background:var(--ink); color:var(--white-card); }

@media(max-width:520px){
  .gallery{ grid-template-columns:1fr 1fr; gap:14px; }
  .letter-card{ padding:32px 22px; }
}
</style>
</head>
<body>

<!-- ============================================================
     🎂 CONFIG: 여기 값만 바꾸면 사이트 전체 내용이 바뀝니다
     ============================================================ -->
<script>
const CONFIG = {
  // 게이트에 표시될 이름/애칭 (예: "민수", "자기", "오빠" 등)
  name: "OOO",

  // "예" 눌렀을 때 도장에 찍힐 문구
  stampText: "승인\n완료",

  // "아니요" 눌렀을 때 보여줄 경고 이미지 URL. 비워두면(""),
  // 아래 rejectEmoji만 큰 이모지로 표시됩니다.
  // 이미지 넣고 싶으면: rejectImageUrl: "https://내이미지주소.jpg"
  rejectImageUrl: "",
  rejectEmoji: "🚨",
  rejectTitle: "당장 나가시오",
  rejectSub: "이 사이트는 본인 확인이 완료된 자만 입장 가능합니다.",

  // 히어로(첫 화면) 문구
  heroEyebrow: "SPECIAL DOCUMENT · 생일 특별 서류",
  heroTitleTop: "생일 축하해",
  heroDesc: "1년에 한 번뿐인 오늘, 너를 위해 준비했어. 천천히 내려보면서 읽어줘.",

  // 편지 내용 (줄바꿈은 그대로 유지됩니다)
  letterBody: `자기야, 생일 축하해!

바쁘다는 핑계로 잘 못 챙겨준 날도 많았는데
그래도 늘 옆에 있어줘서 진심으로 고마워.

오늘 하루는 아무 걱정 없이
그냥 축하만 받는 날이었으면 좋겠어.

앞으로도 같이 웃긴 일 많이 만들고,
맛있는 것도 많이 먹으러 다니자.

사랑해 :)`,
  letterSign: "- 너의 여자친구가",

  // 타임라인 (원하는 만큼 추가/삭제 가능)
  timeline: [
    { date: "2023.03", title: "처음 만난 날", desc: "그때 진짜 어색했는데 지금 생각하면 웃겨." },
    { date: "2023.08", title: "첫 여행", desc: "비 와서 계획 다 틀어졌는데 그래도 재밌었지." },
    { date: "2024.12", title: "가장 웃겼던 순간", desc: "그날 얘기만 하면 아직도 웃음 참기 힘들어." },
    { date: "2026.07", title: "오늘, 너의 생일", desc: "축하해! 앞으로도 잘 부탁해." }
  ],

  // 사진 갤러리. url을 비워두면 점선 placeholder 박스로 표시됩니다.
  // 예: { url: "https://내사진주소.jpg", caption: "그날 그 사진" }
  photos: [
    { url: "", caption: "여기에 사진 추가" },
    { url: "", caption: "여기에 사진 추가" },
    { url: "", caption: "여기에 사진 추가" },
    { url: "", caption: "여기에 사진 추가" }
  ],

  closingTitle: "다시 한 번, 생일 축하해 🎉",
  closingDesc: "오늘 하루도, 앞으로의 모든 날도 행복하길."
};
</script>

<!-- ---------- 게이트 화면 ---------- -->
<div id="gate">
  <div class="doc-card">
    <div class="doc-eyebrow">본인 확인 절차</div>
    <div class="doc-title">— 생일 사이트 입장 서류 —</div>
    <div class="doc-question" id="gateQuestion"></div>
    <div class="doc-sub">아래 항목 중 하나를 선택해주세요</div>
    <div class="doc-buttons">
      <button class="doc-btn yes" id="btnYes">예</button>
      <button class="doc-btn no" id="btnNo">아니요</button>
    </div>
    <div class="doc-check">본 서류는 신중하게 검토된 후 발급되었습니다.</div>
  </div>
</div>

<!-- ---------- 도장 스플래시 ---------- -->
<div id="stamp-splash" class="hidden">
  <div class="stamp-mark" id="stampMark"></div>
</div>

<!-- ---------- 경고(아니요) 화면 ---------- -->
<div id="reject" class="hidden">
  <div class="reject-card">
    <div class="reject-title" id="rejectTitle"></div>
    <div class="reject-sub" id="rejectSub"></div>
    <img id="rejectImg" class="reject-img hidden" alt="경고 이미지">
    <div id="rejectEmojiEl" class="reject-emoji"></div>
    <button class="reject-btn" id="btnRetry">다시 시도하기</button>
  </div>
</div>

<!-- ---------- 본문 ---------- -->
<div id="content" class="hidden">

  <section class="hero">
    <div class="hero-eyebrow" id="heroEyebrow"></div>
    <h1 class="hero-title">
      <span id="heroTitleTop"></span><br>
      <span class="hero-underline" id="heroName"></span>
    </h1>
    <p class="hero-desc" id="heroDesc"></p>
    <div class="hero-scroll">↓ 스크롤해서 계속 보기</div>
  </section>

  <section class="section reveal">
    <div class="label">01</div>
    <h2 class="section-title">전하고 싶은 말</h2>
    <div class="letter-card">
      <div class="tape tl"></div>
      <div class="tape tr"></div>
      <div class="letter-body" id="letterBody"></div>
      <div class="letter-sign" id="letterSign"></div>
    </div>
  </section>

  <section class="section reveal">
    <div class="label">02</div>
    <h2 class="section-title">우리의 순간들</h2>
    <div class="timeline" id="timelineWrap"></div>
  </section>

  <section class="section reveal">
    <div class="label">03</div>
    <h2 class="section-title">사진첩</h2>
    <div class="gallery" id="galleryWrap"></div>
  </section>

  <section class="section closing reveal">
    <div class="closing-title" id="closingTitle"></div>
    <p class="closing-desc" id="closingDesc"></p>
    <button class="replay-btn" id="btnReplay">처음부터 다시 보기</button>
  </section>

</div>

<script>
// ---------- 렌더링 ----------
document.getElementById('gateQuestion').textContent = CONFIG.name + " 입니까?";
document.getElementById('stampMark').textContent = CONFIG.stampText;
document.getElementById('rejectTitle').textContent = CONFIG.rejectTitle;
document.getElementById('rejectSub').textContent = CONFIG.rejectSub;
document.getElementById('heroEyebrow').textContent = CONFIG.heroEyebrow;
document.getElementById('heroTitleTop').textContent = CONFIG.heroTitleTop;
document.getElementById('heroName').textContent = CONFIG.name + "야!";
document.getElementById('heroDesc').textContent = CONFIG.heroDesc;
document.getElementById('letterBody').textContent = CONFIG.letterBody;
document.getElementById('letterSign').textContent = CONFIG.letterSign;
document.getElementById('closingTitle').textContent = CONFIG.closingTitle;
document.getElementById('closingDesc').textContent = CONFIG.closingDesc;

if(CONFIG.rejectImageUrl){
  const img = document.getElementById('rejectImg');
  img.src = CONFIG.rejectImageUrl;
  img.classList.remove('hidden');
} else {
  document.getElementById('rejectEmojiEl').textContent = CONFIG.rejectEmoji;
}

const tlWrap = document.getElementById('timelineWrap');
CONFIG.timeline.forEach(item=>{
  const el = document.createElement('div');
  el.className = 'tl-item';
  el.innerHTML = `
    <div class="tl-date">${item.date}</div>
    <div class="tl-title">${item.title}</div>
    <div class="tl-desc">${item.desc}</div>
  `;
  tlWrap.appendChild(el);
});

const galleryWrap = document.getElementById('galleryWrap');
CONFIG.photos.forEach(p=>{
  const el = document.createElement('div');
  el.className = 'polaroid';
  if(p.url){
    el.innerHTML = `<img class="polaroid-img" src="${p.url}" alt="${p.caption||''}">
      <div class="polaroid-caption">${p.caption||''}</div>`;
  } else {
    el.innerHTML = `<div class="polaroid-placeholder">📷<br>${p.caption||'사진을 추가해주세요'}</div>
      <div class="polaroid-caption">${p.caption||''}</div>`;
  }
  galleryWrap.appendChild(el);
});

// ---------- 인터랙션 ----------
const gate = document.getElementById('gate');
const splash = document.getElementById('stamp-splash');
const stampMark = document.getElementById('stampMark');
const reject = document.getElementById('reject');
const content = document.getElementById('content');

document.getElementById('btnYes').addEventListener('click', ()=>{
  gate.classList.add('hidden');
  splash.classList.remove('hidden');
  stampMark.classList.remove('slam');
  void stampMark.offsetWidth; // reflow to restart animation
  stampMark.classList.add('slam');
  setTimeout(()=>{
    splash.classList.add('hidden');
    content.classList.remove('hidden');
    initReveal();
    window.scrollTo(0,0);
  }, 1100);
});

document.getElementById('btnNo').addEventListener('click', ()=>{
  gate.classList.add('hidden');
  reject.classList.remove('hidden');
});

document.getElementById('btnRetry').addEventListener('click', ()=>{
  reject.classList.add('hidden');
  gate.classList.remove('hidden');
});

document.getElementById('btnReplay').addEventListener('click', ()=>{
  content.classList.add('hidden');
  window.scrollTo(0,0);
  gate.classList.remove('hidden');
});

function initReveal(){
  const items = document.querySelectorAll('.reveal');
  const io = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
      if(e.isIntersecting){ e.target.classList.add('show'); }
    });
  }, { threshold:0.15 });
  items.forEach(i=>io.observe(i));
}
</script>

</body>
</html>
